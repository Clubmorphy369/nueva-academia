<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Academia Virtual</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1976d2">
  <style>
    :root {
      --primary-color: #1976d2;
      --secondary-color: #4caf50;
      --bg-color: #f5f5f5;
      --surface-color: #ffffff;
      --text-color: #333333;
      --text-secondary: #666666;
      --border-color: #dddddd;
      --border-radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --base-font-size: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      font-size: var(--base-font-size);
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    a { color: var(--primary-color); }
    .card, .modal-box { background: var(--surface-color); border-radius: var(--border-radius); box-shadow: var(--shadow); }
    input, select, textarea {
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 8px;
      font-family: var(--font-family);
      font-size: var(--base-font-size);
    }
    button { font-family: var(--font-family); min-height: 44px; min-width: 44px; }
    .btn-primary { background: var(--primary-color); color: white; border: none; border-radius: var(--border-radius); }
    .btn-secondary { background: var(--secondary-color); color: white; border: none; border-radius: var(--border-radius); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    #app { display: flex; min-height: 100vh; }
    #main-content { flex: 1; margin-left: 0; transition: margin-left 0.3s ease, opacity 0.2s ease; padding: 20px; max-width: 100%; overflow-y: auto; }
    @media (min-width: 1024px) { #main-content { margin-left: 280px; } }
  </style>
</head>
<body>
  <div id="authContainer"></div>
  <div id="app" style="display: none;">
    <!-- Sidebar y contenido principal se insertan dinámicamente -->
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="../src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
