<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Academia Virtual</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1976d2">
  <style>
    :root {
      --primary-color: #1976d2;
      --secondary-color: #4caf50;
      --bg-color: #f5f5f5;
      --surface-color: #ffffff;
      --text-color: #333333;
      --text-secondary: #666666;
      --border-color: #dddddd;
      --border-radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --base-font-size: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--base-font-size);
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
      touch-action: manipulation;
    }

    button, input, select, textarea, .clickable {
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      font-family: var(--font-family);
      font-size: var(--base-font-size);
    }

    button, .btn, [role="button"] {
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: none;
      padding: 10px 16px;
      border-radius: var(--border-radius);
      transition: opacity 0.2s, transform 0.2s;
    }

    button:active, .btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    input, select, textarea {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px; /* Evita zoom automático en iOS */
      background: var(--surface-color);
      color: var(--text-color);
      width: 100%;
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface-color);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
      font-weight: 600;
    }

    .btn-secondary {
      background: var(--secondary-color);
      color: white;
      font-weight: 600;
    }

    .btn-danger {
      background: #f44336;
      color: white;
      font-weight: 600;
    }

    #app {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    #main-content {
      flex: 1;
      margin-left: 0;
      transition: margin-left 0.3s ease, opacity 0.2s ease;
      padding: 16px;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Sidebar mejorado para móvil */
    #app-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 280px;
      max-width: 80vw;
      background: #1e1e2d;
      color: #fff;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      will-change: transform;
    }

    #app-sidebar.open {
      transform: translateX(0);
    }

    #sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
      transition: opacity 0.3s;
    }

    #sidebar-overlay.visible {
      display: block;
    }

    /* Toast mejorado */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      width: calc(100% - 40px);
      max-width: 400px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideInRight 0.3s ease-out;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Modal mejorado para móvil */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 5000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-box {
      background: var(--surface-color);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px;
      max-width: 100%;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @media (min-width: 768px) {
      #modal-box {
        border-radius: 16px;
        max-width: 500px;
        width: 90%;
        margin: auto;
        animation: fadeIn 0.2s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
    }

    /* Escritorio: sidebar fijo */
    @media (min-width: 1024px) {
      #app-sidebar {
        transform: translateX(0);
        max-width: 280px;
      }
      #main-content {
        margin-left: 280px;
      }
      #sidebar-overlay {
        display: none !important;
      }
    }

    /* Ajustes para tablas en móvil */
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Utilidad para ocultar elementos solo en móvil/escritorio */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    /* Mejora para botones de acción flotantes */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-color);
      color: white;
      font-size: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform 0.2s;
    }

    .fab:active {
      transform: scale(0.9);
    }
  </style>
</head>
<body>
  <div id="authContainer"></div>
  <div id="app" style="display: none;"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
